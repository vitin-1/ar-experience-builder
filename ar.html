  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #0066ff;
      --accent: #00d4ff;
      --glow: rgba(0, 212, 255, 0.5);
      --bg-dark: #03060c;
      --glass: rgba(5, 15, 35, 0.85);
      --glass-border: rgba(0, 212, 255, 0.15);
      --font: 'Inter', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body, html {
      width: 100%; height: 100vh; height: 100dvh;
      overflow: hidden; background: var(--bg-dark);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* === CAMERA CANVAS === */
    #camerafeed {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh; height: 100dvh;
      z-index: 1;
    }

    /* === VIDEO OVERLAY — hidden, used as texture source === */
    .video-src {
      position: absolute;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0.001;
      pointer-events: none;
    }

    /* === BACK BUTTON === */
    .btn-voltar {
      position: fixed; top: env(safe-area-inset-top, 20px); left: 16px;
      margin-top: 16px; z-index: 100;
      padding: 10px 18px; background: var(--glass);
      border: 1px solid var(--glass-border); color: var(--accent);
      text-decoration: none; font-family: var(--font); font-size: 11px;
      font-weight: 700; border-radius: 50px; display: flex; align-items: center;
      gap: 6px; text-transform: uppercase; letter-spacing: 1.5px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      transition: all 0.25s ease;
    }
    .btn-voltar:active { transform: scale(0.93); background: rgba(0,102,255,0.25); }
    .btn-voltar svg { width: 14px; height: 14px; }

    /* === TAP-TO-START OVERLAY === */
    #tap-overlay {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(0,102,255,0.08) 0%, var(--bg-dark) 70%);
      z-index: 200; display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 24px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: opacity 0.8s ease, visibility 0.8s;
    }
    #tap-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .tap-ring {
      width: 80px; height: 80px; position: relative;
      display: flex; justify-content: center; align-items: center;
    }
    .tap-ring::before {
      content: ''; position: absolute; inset: 0;
      border-radius: 50%; border: 2px solid var(--accent);
      animation: tapPulse 2s ease-in-out infinite;
      filter: drop-shadow(0 0 10px var(--glow));
    }
    .tap-ring::after {
      content: ''; position: absolute; inset: 12px;
      border-radius: 50%; border: 1px solid rgba(0,212,255,0.3);
      animation: tapPulse 2s ease-in-out infinite 0.3s;
    }
    .tap-ring svg {
      width: 28px; height: 28px; stroke: var(--accent); fill: none;
      stroke-width: 1.5; opacity: 0.9;
      filter: drop-shadow(0 0 6px var(--glow));
    }
    @keyframes tapPulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    .tap-label {
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      animation: pulse 2.5s ease-in-out infinite;
    }
    .tap-sublabel {
      font-family: var(--font); font-size: 10px; font-weight: 400;
      color: rgba(255,255,255,0.25); letter-spacing: 1px;
      margin-top: -12px;
    }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

    .loader-ring {
      width: 56px; height: 56px; position: relative;
    }
    .loader-ring::before, .loader-ring::after {
      content: ''; position: absolute; inset: 0;
      border-radius: 50%; border: 2px solid transparent;
    }
    .loader-ring::before {
      border-top-color: var(--accent); border-right-color: var(--accent);
      animation: ringA 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      filter: drop-shadow(0 0 8px var(--glow));
    }
    .loader-ring::after {
      border-bottom-color: var(--primary); border-left-color: var(--primary);
      animation: ringB 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      opacity: 0.6;
    }
    @keyframes ringA { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
    @keyframes ringB { 0% { transform: rotate(120deg); } 100% { transform: rotate(480deg); } }

    /* === HUD SCANNER === */
    .hud-corners {
      position: fixed; inset: 0; pointer-events: none;
      z-index: 50; transition: opacity 0.6s ease;
    }
    .hud-corners.hidden { opacity: 0; }

    .corn {
      position: absolute; width: 32px; height: 32px;
      border: 2px solid var(--accent);
      opacity: 0.7;
      filter: drop-shadow(0 0 6px var(--glow));
      transition: opacity 0.3s;
      animation: cornerPulse 1.5s ease-in-out infinite alternate;
    }
    @keyframes cornerPulse {
      from { opacity: 0.4; filter: drop-shadow(0 0 2px var(--glow)); transform: scale(0.98); }
      to { opacity: 1; filter: drop-shadow(0 0 12px var(--glow)); transform: scale(1.02); }
    }
    .corn.tl { top: 24px; left: 16px; border-right: 0; border-bottom: 0; border-radius: 4px 0 0 0; }
    .corn.tr { top: 24px; right: 16px; border-left: 0; border-bottom: 0; border-radius: 0 4px 0 0; }
    .corn.bl { bottom: 24px; left: 16px; border-right: 0; border-top: 0; border-radius: 0 0 0 4px; }
    .corn.br { bottom: 24px; right: 16px; border-left: 0; border-top: 0; border-radius: 0 0 4px 0; }

    .scan-line {
      position: absolute; left: 8%; width: 84%; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 30%, var(--accent) 70%, transparent 100%);
      box-shadow: 0 0 20px var(--glow), 0 0 60px rgba(0,102,255,0.15);
      animation: scanMove 2.8s cubic-bezier(0.4,0,0.2,1) infinite;
      border-radius: 2px; opacity: 0.8;
    }
    @keyframes scanMove {
      0% { top: 15%; opacity: 0; } 10% { opacity: 0.8; }
      90% { opacity: 0.8; } 100% { top: 85%; opacity: 0; }
    }

    .scan-hint {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      font-family: var(--mono); font-size: 10px; font-weight: 500;
      letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.4); z-index: 55;
      text-align: center; pointer-events: none;
      animation: pulse 3s ease-in-out infinite;
      transition: opacity 0.5s;
    }
    .scan-hint.hidden { opacity: 0; }

    /* === STATUS PILL === */
    .status-pill {
      position: fixed; top: env(safe-area-inset-top, 20px); right: 16px;
      margin-top: 16px; z-index: 100;
      padding: 8px 16px; border-radius: 50px;
      font-family: var(--mono); font-size: 10px; font-weight: 500;
      letter-spacing: 1px; text-transform: uppercase;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; align-items: center; gap: 6px;
      transform: translateY(-60px); opacity: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .status-pill.show {
      transform: translateY(0); opacity: 1;
    }
    .status-pill.found {
      background: rgba(0, 180, 80, 0.25); border: 1px solid rgba(0, 220, 100, 0.3);
      color: #4ade80;
    }
    .status-pill.lost {
      background: rgba(200, 80, 0, 0.2); border: 1px solid rgba(255, 150, 50, 0.3);
      color: #fb923c;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      animation: dotPulse 1.5s ease-in-out infinite;
    }
    .status-pill.found .status-dot { background: #4ade80; }
    .status-pill.lost .status-dot { background: #fb923c; }
    @keyframes dotPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    #ar-controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px 16px calc(env(safe-area-inset-bottom, 8px) + 16px);
      display: flex; justify-content: center; gap: 10px;
      z-index: 60; pointer-events: auto;
      background: linear-gradient(to top, rgba(3,6,12,0.9) 0%, transparent 100%);
    }
    .ar-btn {
      flex: 1; max-width: 180px;
      background: var(--glass); border: 1px solid var(--glass-border);
      padding: 14px 16px; border-radius: 14px;
      text-decoration: none; font-size: 10px; font-weight: 700;
      font-family: var(--font);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: all 0.25s ease;
      text-transform: uppercase; letter-spacing: 1px;
      color: rgba(255,255,255,0.85);
    }
    .ar-btn:active {
      transform: scale(0.95);
      background: rgba(0,102,255,0.2);
      border-color: var(--accent);
    }
    .ar-btn img, .ar-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .ar-btn svg { stroke: var(--accent); fill: none; }

    /* === ERROR MODAL === */
    #error-modal {
      position: fixed; inset: 0;
      background: rgba(3,6,12,0.97); z-index: 300;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 32px; text-align: center;
      opacity: 0; visibility: hidden;
      transition: opacity 0.5s ease;
    }
    #error-modal.show { opacity: 1; visibility: visible; }
    .error-box {
      background: rgba(0,102,255,0.04); border: 1px solid rgba(0,102,255,0.2);
      padding: 32px; border-radius: 20px; max-width: 380px;
      backdrop-filter: blur(20px);
    }
    .error-box h2 {
      color: var(--accent); margin-bottom: 12px;
      font-size: 16px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 2px;
    }
    .error-box p {
      color: rgba(255,255,255,0.6); font-size: 13px; line-height: 1.7; margin-bottom: 24px;
    }
    .error-steps {
      background: rgba(0,102,255,0.06); border-left: 2px solid var(--accent);
      padding: 16px; text-align: left; margin-bottom: 28px;
      border-radius: 0 12px 12px 0; font-size: 12px;
      line-height: 1.8; color: rgba(255,255,255,0.7);
    }
    .error-steps strong { color: var(--accent); }
    .btn-reload {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white; border: none; padding: 14px 28px; border-radius: 50px;
      font-family: var(--font); font-weight: 700; font-size: 12px;
      text-transform: uppercase; letter-spacing: 1.5px;
      cursor: pointer; box-shadow: 0 6px 24px rgba(0,102,255,0.35);
    }

    @media (min-width: 768px) {
      .ar-btn { max-width: 220px; padding: 16px 24px; font-size: 12px; }
      .btn-voltar { font-size: 12px; padding: 12px 22px; }
      .corn { width: 48px; height: 48px; }
    }

    /* === ADAPTIVE PERFORMANCE: LOW-END DEVICES === */
    body.perf-low .btn-voltar,
    body.perf-low .ar-btn,
    body.perf-low .status-pill {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      background: rgba(3, 6, 12, 0.92) !important;
    }
    body.perf-low .corn {
      animation: none !important;
      filter: none !important;
      opacity: 0.7;
    }
    body.perf-low .scan-line {
      box-shadow: none !important;
      animation-duration: 4s !important;
    }
    body.perf-low .tap-ring::before,
    body.perf-low .tap-ring::after {
      animation: none !important;
      filter: none !important;
    }
    body.perf-low .tap-ring svg { filter: none !important; }
    body.perf-low .loader-ring::before { filter: none !important; }
    body.perf-low #tap-overlay {
      background: var(--bg-dark) !important;
    }
    body.perf-low .error-box { backdrop-filter: none !important; }
  </style>
</head>

  <script>
    // === PERFORMANCE DETECTION ===
    (function() {
      var dominated = false;
      var cores = navigator.hardwareConcurrency;
      var mem = navigator.deviceMemory;
      
      // Apenas rebaixa a qualidade se tivermos certeza que é um hardware fraco
      if (cores !== undefined && cores <= 4) dominated = true;
      if (mem !== undefined && mem <= 3) dominated = true;

      // Safari do iOS esconde a memória por privacidade. 
      // Qualquer iPhone que roda 8th Wall (ARKit) tem poder de sobra.
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      if (isIOS) {
        dominated = false; 
      }

      if (dominated) document.body.classList.add('perf-low');
      window.__perfLow = dominated;
    })();
  </script>

  <script>
    // === CONFIG ===
    const SUPABASE_URL = 'https://xeyfzhkualdchxedwkhz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_MmczBA1FTY2mMU3TBX32gw_YUHzHgci';

    // === ELEMENTS ===
    const tapOverlay = document.getElementById('tap-overlay');
    const loadingSpinner = document.getElementById('loading-spinner');
    const loadingText = document.getElementById('loading-text');
    const tapIcon = document.getElementById('tap-icon');
    const tapText = document.getElementById('tap-text');
    const tapSub = document.getElementById('tap-sub');
    const errorModal = document.getElementById('error-modal');
    const scannerHUD = document.getElementById('scanner-hud');
    const scanHint = document.getElementById('scan-hint');
    const statusPill = document.getElementById('status-pill');
    const statusTextEl = document.getElementById('status-text');
    const videoContainer = document.getElementById('video-container');
    const arControls = document.getElementById('ar-controls');

    // === DYNAMIC STATE ===
    const meshes = {};        // name -> { mesh, video, texture }
    const targetLabels = {};   // name -> label
    let imageTargetData = [];  // array para XR8
    let allVideos = [];        // todos os <video> criados

    // === STATUS PILL ===
    let pillTimer = null;
    function showStatus(msg, type = 'found') {
      statusPill.className = 'status-pill show ' + type;
      statusTextEl.textContent = msg;
      clearTimeout(pillTimer);
      pillTimer = setTimeout(() => statusPill.classList.remove('show'), type === 'found' ? 8000 : 3000);

    // === LOAD TARGETS FROM SUPABASE ===
    async function loadTargetsFromDB() {
      try {
        if (!window.supabase) throw new Error('Supabase CDN não carregou');
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const { data, error } = await sb.from('ar_targets')
          .select('target_name, label, target_image_url, video_url, video_aspect, target_properties')
          .eq('active', true);
        if (error) throw error;
        return data || [];
      } catch (err) {
        console.warn('Erro ao carregar targets, usando fallback:', err);
        // Fallback hardcoded caso o Supabase falhe
        return [
          { target_name:'hunters', label:'Hunters', target_image_url:'/targets/hunters.png', video_url:'/video.mp4', video_aspect:'16:9', target_properties:{left:0,top:167,width:480,height:305,originalWidth:480,originalHeight:640,isRotated:false} },
          { target_name:'navegue', label:'Navegue Seguro', target_image_url:'/targets/navegue.png', video_url:'/video-neymar.mp4', video_aspect:'9:16', target_properties:{left:15,top:0,width:449,height:640,originalWidth:480,originalHeight:640,isRotated:false} }
        ];
      }
    }

    function createVideoElement(name, src) {
      const v = document.createElement('video');
      v.id = 'video-' + name;
      v.className = 'video-src';
      v.src = src;
      v.loop = true;
      v.playsInline = true;
      v.setAttribute('webkit-playsinline', '');
      v.setAttribute('disablePictureInPicture', '');
      v.setAttribute('disableRemotePlayback', '');
      v.crossOrigin = 'anonymous';
      v.preload = 'metadata';
      videoContainer.appendChild(v);
      return v;
    }

    function getAspectHeight(aspect) {
      if (aspect === '9:16') return 1.7778;
      if (aspect === '1:1') return 1;
      return 0.5625; // 16:9 default
    }

    // === GEOMETRIA ARREDONDADA PARA OS VÍDEOS ===
    function createRoundedGeometry(width, height, radius) {
      const shape = new THREE.Shape();
      const x = -width / 2;
      const y = -height / 2;

      shape.moveTo(x, y + radius);
      shape.lineTo(x, y + height - radius);
      shape.quadraticCurveTo(x, y + height, x + radius, y + height);
      shape.lineTo(x + width - radius, y + height);
      shape.quadraticCurveTo(x + width, y + height, x + width, y + height - radius);
      shape.lineTo(x + width, y + radius);
      shape.quadraticCurveTo(x + width, y, x + width - radius, y);
      shape.lineTo(x + radius, y);
      shape.quadraticCurveTo(x, y, x, y + radius);

      const geo = new THREE.ShapeGeometry(shape, 12); // 12 segmentos de curva para suavidade
      
      // Mapeamento correto de UV para preencher a textura
      const pos = geo.attributes.position;
      const uv = geo.attributes.uv;
      for (let i = 0; i < pos.count; i++) {
        uv.setXY(i, (pos.getX(i) + width / 2) / width, (pos.getY(i) + height / 2) / height);
      }
      return geo;
    }

    // === THREE.JS SCENE (DINÂMICO) ===
    function initXrScene({ scene }) {
      Object.values(meshes).forEach(t => {
        const tex = new THREE.VideoTexture(t.video);
        tex.minFilter = THREE.LinearFilter;
        const mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
        
        // Em vez do PlaneGeometry quadrado, usa o card arredondado com radius de 0.05
        const geo = createRoundedGeometry(1, t.aspectHeight, 0.05);
        
        const mesh = new THREE.Mesh(geo, mat);
        mesh.visible = false;
        scene.add(mesh);
        t.mesh = mesh;
        t.texture = tex;
      });
    }

    function showTarget(detail) {
      const { name, position, rotation, scale } = detail;
      const t = meshes[name];
      if (!t) return;
      t.mesh.position.copy(position);
      t.mesh.quaternion.copy(rotation);
      t.mesh.scale.set(scale, scale, scale); // Aplica a escala instantaneamente para evitar pulsação

      if (!t.mesh.visible) {
        t.mesh.visible = true;
      }
      
      const tryPlay = () => {
        const p = t.video.play();
        if (p) p.catch(() => { t.video.muted = true; t.video.play().catch(() => {}); });
      };
      if (t.video.readyState >= 2) { tryPlay(); }
      else {
        t.video.load();
        t.video.addEventListener('canplay', () => tryPlay(), { once: true });
        setTimeout(tryPlay, 3000);
      }
      scannerHUD.classList.add('hidden');
      scanHint.classList.add('hidden');
      showStatus(targetLabels[name] || name, 'found');
    }

    function hideTarget(name) {
      const t = meshes[name];
      if (!t) return;
      t.mesh.visible = false;
      t.video.pause();
      if (!Object.values(meshes).some(m => m.mesh && m.mesh.visible)) {
        scannerHUD.classList.remove('hidden');
        scanHint.classList.remove('hidden');
      }
      showStatus('Escaneando...', 'lost');
    }

    // === MAIN INIT ===
    async function initAR() {
      const targets = await loadTargetsFromDB();

      targets.forEach(row => {
        const vid = createVideoElement(row.target_name, row.video_url || '');
        allVideos.push(vid);
        targetLabels[row.target_name] = row.label || row.target_name;
        meshes[row.target_name] = { video: vid, aspectHeight: getAspectHeight(row.video_aspect), mesh: null, texture: null };

        const props = typeof row.target_properties === 'string' ? JSON.parse(row.target_properties) : (row.target_properties || {});
        imageTargetData.push({
          imagePath: row.target_image_url,
          metadata: {},
          name: row.target_name,
          type: 'PLANAR',
          properties: {
            left: props.left || 0, top: props.top || 0,
            width: props.width || 480, height: props.height || 640,
            originalWidth: props.originalWidth || 480, originalHeight: props.originalHeight || 640,
            isRotated: props.isRotated || false
          }
        });
      });

      // Aguarda XR8
      const onxrloaded = () => {
        XR8.XrController.configure({ imageTargetData });
        XR8.addCameraPipelineModules([
          XR8.GlTextureRenderer.pipelineModule(),
          XR8.Threejs.pipelineModule(),
          XR8.XrController.pipelineModule(),
          {
            name: 'hunters-ar',
            onStart: () => initXrScene(XR8.Threejs.xrScene()),
            onUpdate: () => {
              // A escala agora é aplicada instantaneamente, dispensando o loop de animação de pulso.
            },
            listeners: [
              { event: 'reality.imagefound', process: e => showTarget(e.detail) },
              { event: 'reality.imageupdated', process: e => showTarget(e.detail) },
              { event: 'reality.imagelost', process: e => hideTarget(e.detail.name) }
            ]
          }
        ]);
        loadingSpinner.style.display = 'none';
        loadingText.style.display = 'none';
        tapIcon.style.display = 'flex';
        tapText.style.display = 'block';
        tapSub.style.display = 'block';
      };
      window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
    }

    // Iniciar
    initAR();

    // === TAP TO START ===
    tapOverlay.addEventListener('click', () => {
      allVideos.forEach(v => {
        v.muted = true;
        v.load();
        const p = v.play();
        if (p) p.then(() => { v.pause(); v.currentTime = 0; v.muted = false; }).catch(() => {});
      });
      tapOverlay.classList.add('hidden');
      try {
        const canvas = document.getElementById('camerafeed');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        XR8.run({ canvas, allowedDevices: XR8.XrConfig.device().ANY });
      } catch (e) { errorModal.classList.add('show'); }
    });

    // === BACK ===
    document.getElementById('btn-voltar').addEventListener('click', (e) => {
      e.preventDefault();
      Object.values(meshes).forEach(t => { if (t.mesh) t.mesh.visible = false; t.video.pause(); });
      try { XR8.stop(); } catch(err) {}
      window.location.href = 'index.html';
    });

    // === CLEANUP & BACKGROUND HANDLING ===
    window.addEventListener('pagehide', () => {
      Object.values(meshes).forEach(t => { if (t.mesh) t.mesh.visible = false; t.video.pause(); });
      try { XR8.stop(); } catch(err) {}
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        // Pausa os vídeos imediatamente se a aba ficar em segundo plano
        Object.values(meshes).forEach(t => t.video.pause());
      } else {
        // Retoma se o alvo ainda estiver visível ao voltar para a aba
        Object.values(meshes).forEach(t => {
          if (t.mesh && t.mesh.visible) {
             t.video.play().catch(() => {});
          }
        });
      }
    });

    // Pausa os vídeos preventivamente ao clicar nos botões que abrem nova guia
    document.querySelectorAll('.ar-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        Object.values(meshes).forEach(t => t.video.pause());
      });
    });

    // === TIMEOUT ===
    setTimeout(() => {
      if (!tapOverlay.classList.contains('hidden')) {
        tapOverlay.classList.add('hidden');
        errorModal.classList.add('show');
      }
    }, 25000);
  </script>
</body>
</html>
