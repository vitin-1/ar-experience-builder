<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Experiência de Realidade Aumentada Hunters ManPower — aponte para a logo e veja o holograma.">
  <meta name="theme-color" content="#03060c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Visualização AR — Hunters ManPower</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- 8th Wall XR Engine (SLAM for Image Targets) -->
  <script async src="/xr/xr.js" data-preload-chunks="slam"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #0066ff;
      --accent: #00d4ff;
      --glow: rgba(0, 212, 255, 0.5);
      --bg-dark: #03060c;
      --glass: rgba(5, 15, 35, 0.85);
      --glass-border: rgba(0, 212, 255, 0.15);
      --font: 'Inter', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body, html {
      width: 100%; height: 100vh; height: 100dvh;
      overflow: hidden; background: var(--bg-dark);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* === CAMERA CANVAS === */
    #camerafeed {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh; height: 100dvh;
      z-index: 1;
    }

    /* === VIDEO OVERLAY === */
    .video-overlay {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh; height: 100dvh;
      display: none; z-index: 10;
      justify-content: center; align-items: center;
      pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, transparent 70%);
    }
    .video-overlay.active {
      display: flex;
      animation: overlayIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .video-overlay video {
      max-width: 85vw; max-height: 55vh;
      border-radius: 12px;
      box-shadow:
        0 0 0 1px rgba(0,212,255,0.2),
        0 8px 32px rgba(0,0,0,0.6),
        0 0 60px rgba(0,102,255,0.15);
      backdrop-filter: blur(2px);
    }
    @keyframes overlayIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }

    /* === BACK BUTTON === */
    .btn-voltar {
      position: fixed; top: env(safe-area-inset-top, 20px); left: 16px;
      margin-top: 16px; z-index: 100;
      padding: 10px 18px; background: var(--glass);
      border: 1px solid var(--glass-border); color: var(--accent);
      text-decoration: none; font-family: var(--font); font-size: 11px;
      font-weight: 700; border-radius: 50px; display: flex; align-items: center;
      gap: 6px; text-transform: uppercase; letter-spacing: 1.5px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      transition: all 0.25s ease;
    }
    .btn-voltar:active { transform: scale(0.93); background: rgba(0,102,255,0.25); }
    .btn-voltar svg { width: 14px; height: 14px; }

    /* === TAP-TO-START OVERLAY === */
    #tap-overlay {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(0,102,255,0.08) 0%, var(--bg-dark) 70%);
      z-index: 200; display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 24px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: opacity 0.8s ease, visibility 0.8s;
    }
    #tap-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .tap-ring {
      width: 80px; height: 80px; position: relative;
      display: flex; justify-content: center; align-items: center;
    }
    .tap-ring::before {
      content: ''; position: absolute; inset: 0;
      border-radius: 50%; border: 2px solid var(--accent);
      animation: tapPulse 2s ease-in-out infinite;
      filter: drop-shadow(0 0 10px var(--glow));
    }
    .tap-ring::after {
      content: ''; position: absolute; inset: 12px;
      border-radius: 50%; border: 1px solid rgba(0,212,255,0.3);
      animation: tapPulse 2s ease-in-out infinite 0.3s;
    }
    .tap-ring svg {
      width: 28px; height: 28px; stroke: var(--accent); fill: none;
      stroke-width: 1.5; opacity: 0.9;
      filter: drop-shadow(0 0 6px var(--glow));
    }
    @keyframes tapPulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    .tap-label {
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      animation: pulse 2.5s ease-in-out infinite;
    }
    .tap-sublabel {
      font-family: var(--font); font-size: 10px; font-weight: 400;
      color: rgba(255,255,255,0.25); letter-spacing: 1px;
      margin-top: -12px;
    }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

    .loader-ring {
      width: 56px; height: 56px; position: relative;
    }
    .loader-ring::before, .loader-ring::after {
      content: ''; position: absolute; inset: 0;
      border-radius: 50%; border: 2px solid transparent;
    }
    .loader-ring::before {
      border-top-color: var(--accent); border-right-color: var(--accent);
      animation: ringA 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      filter: drop-shadow(0 0 8px var(--glow));
    }
    .loader-ring::after {
      border-bottom-color: var(--primary); border-left-color: var(--primary);
      animation: ringB 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      opacity: 0.6;
    }
    @keyframes ringA { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
    @keyframes ringB { 0% { transform: rotate(120deg); } 100% { transform: rotate(480deg); } }

    /* === HUD SCANNER === */
    .hud-corners {
      position: fixed; inset: 0; pointer-events: none;
      z-index: 50; transition: opacity 0.6s ease;
    }
    .hud-corners.hidden { opacity: 0; }

    .corn {
      position: absolute; width: 32px; height: 32px;
      border: 2px solid var(--accent);
      opacity: 0.7;
      filter: drop-shadow(0 0 6px var(--glow));
      transition: opacity 0.3s;
    }
    .corn.tl { top: 24px; left: 16px; border-right: 0; border-bottom: 0; border-radius: 4px 0 0 0; }
    .corn.tr { top: 24px; right: 16px; border-left: 0; border-bottom: 0; border-radius: 0 4px 0 0; }
    .corn.bl { bottom: 24px; left: 16px; border-right: 0; border-top: 0; border-radius: 0 0 0 4px; }
    .corn.br { bottom: 24px; right: 16px; border-left: 0; border-top: 0; border-radius: 0 0 4px 0; }

    .scan-line {
      position: absolute; left: 8%; width: 84%; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 30%, var(--accent) 70%, transparent 100%);
      box-shadow: 0 0 20px var(--glow), 0 0 60px rgba(0,102,255,0.15);
      animation: scanMove 2.8s cubic-bezier(0.4,0,0.2,1) infinite;
      border-radius: 2px; opacity: 0.8;
    }
    @keyframes scanMove {
      0% { top: 15%; opacity: 0; } 10% { opacity: 0.8; }
      90% { opacity: 0.8; } 100% { top: 85%; opacity: 0; }
    }

    .scan-hint {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      font-family: var(--mono); font-size: 10px; font-weight: 500;
      letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.4); z-index: 55;
      text-align: center; pointer-events: none;
      animation: pulse 3s ease-in-out infinite;
      transition: opacity 0.5s;
    }
    .scan-hint.hidden { opacity: 0; }

    /* === STATUS PILL === */
    .status-pill {
      position: fixed; top: env(safe-area-inset-top, 20px); right: 16px;
      margin-top: 16px; z-index: 100;
      padding: 8px 16px; border-radius: 50px;
      font-family: var(--mono); font-size: 10px; font-weight: 500;
      letter-spacing: 1px; text-transform: uppercase;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; align-items: center; gap: 6px;
      transform: translateY(-60px); opacity: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .status-pill.show {
      transform: translateY(0); opacity: 1;
    }
    .status-pill.found {
      background: rgba(0, 180, 80, 0.25); border: 1px solid rgba(0, 220, 100, 0.3);
      color: #4ade80;
    }
    .status-pill.lost {
      background: rgba(200, 80, 0, 0.2); border: 1px solid rgba(255, 150, 50, 0.3);
      color: #fb923c;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      animation: dotPulse 1.5s ease-in-out infinite;
    }
    .status-pill.found .status-dot { background: #4ade80; }
    .status-pill.lost .status-dot { background: #fb923c; }
    @keyframes dotPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* === BOTTOM CONTROLS === */
    #ar-controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px 16px calc(env(safe-area-inset-bottom, 8px) + 16px);
      display: flex; justify-content: center; gap: 10px;
      z-index: 60; pointer-events: auto;
      background: linear-gradient(to top, rgba(3,6,12,0.9) 0%, transparent 100%);
    }
    .ar-btn {
      flex: 1; max-width: 180px;
      background: var(--glass); border: 1px solid var(--glass-border);
      padding: 14px 16px; border-radius: 14px;
      text-decoration: none; font-size: 10px; font-weight: 700;
      font-family: var(--font);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: all 0.25s ease;
      text-transform: uppercase; letter-spacing: 1px;
      color: rgba(255,255,255,0.85);
    }
    .ar-btn:active {
      transform: scale(0.95);
      background: rgba(0,102,255,0.2);
      border-color: var(--accent);
    }
    .ar-btn img, .ar-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .ar-btn svg { stroke: var(--accent); fill: none; }

    /* === ERROR MODAL === */
    #error-modal {
      position: fixed; inset: 0;
      background: rgba(3,6,12,0.97); z-index: 300;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 32px; text-align: center;
      opacity: 0; visibility: hidden;
      transition: opacity 0.5s ease;
    }
    #error-modal.show { opacity: 1; visibility: visible; }
    .error-box {
      background: rgba(0,102,255,0.04); border: 1px solid rgba(0,102,255,0.2);
      padding: 32px; border-radius: 20px; max-width: 380px;
      backdrop-filter: blur(20px);
    }
    .error-box h2 {
      color: var(--accent); margin-bottom: 12px;
      font-size: 16px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 2px;
    }
    .error-box p {
      color: rgba(255,255,255,0.6); font-size: 13px; line-height: 1.7; margin-bottom: 24px;
    }
    .error-steps {
      background: rgba(0,102,255,0.06); border-left: 2px solid var(--accent);
      padding: 16px; text-align: left; margin-bottom: 28px;
      border-radius: 0 12px 12px 0; font-size: 12px;
      line-height: 1.8; color: rgba(255,255,255,0.7);
    }
    .error-steps strong { color: var(--accent); }
    .btn-reload {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white; border: none; padding: 14px 28px; border-radius: 50px;
      font-family: var(--font); font-weight: 700; font-size: 12px;
      text-transform: uppercase; letter-spacing: 1.5px;
      cursor: pointer; box-shadow: 0 6px 24px rgba(0,102,255,0.35);
    }

    @media (min-width: 768px) {
      .ar-btn { max-width: 220px; padding: 16px 24px; font-size: 12px; }
      .btn-voltar { font-size: 12px; padding: 12px 22px; }
      .corn { width: 48px; height: 48px; }
    }
  </style>
</head>

<body>
  <!-- Tap to Start Overlay -->
  <div id="tap-overlay">
    <div class="loader-ring" id="loading-spinner"></div>
    <div class="tap-label" id="loading-text">Carregando engine...</div>
    <div class="tap-ring" id="tap-icon" style="display:none">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 18v-6m0 0V8m0 4h4m-4 0H8"/>
        <circle cx="12" cy="12" r="10"/>
      </svg>
    </div>
    <div class="tap-label" id="tap-text" style="display:none">Toque para iniciar</div>
    <div class="tap-sublabel" id="tap-sub" style="display:none">Permita o acesso à câmera</div>
  </div>

  <!-- Error Modal -->
  <div id="error-modal">
    <div class="error-box">
      <h2>Câmera Bloqueada</h2>
      <p>Precisamos da câmera para a experiência AR.</p>
      <div class="error-steps">
        <strong>Como liberar:</strong><br>
        1. Toque no <strong>cadeado 🔒</strong> na barra de endereços<br>
        2. Mude <strong>Câmera</strong> → <strong>Permitir</strong><br>
        3. Toque abaixo para reiniciar
      </div>
      <button class="btn-reload" onclick="location.reload()">Reiniciar</button>
    </div>
  </div>

  <!-- HUD Scanner -->
  <div class="hud-corners" id="scanner-hud">
    <div class="corn tl"></div>
    <div class="corn tr"></div>
    <div class="corn bl"></div>
    <div class="corn br"></div>
    <div class="scan-line"></div>
  </div>

  <!-- Scan Hint -->
  <div class="scan-hint" id="scan-hint">Aponte para uma logo</div>

  <!-- Status Pill -->
  <div class="status-pill" id="status-pill">
    <span class="status-dot"></span>
    <span id="status-text"></span>
  </div>

  <!-- Back Button -->
  <a href="index.html" class="btn-voltar" id="btn-voltar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
    Voltar
  </a>

  <!-- Bottom Controls -->
  <div id="ar-controls">
    <a href="https://wa.me/5521997154499?text=Ol%C3%A1%2C%20vim%20pela%20experi%C3%AAncia%20AR%20da%20Hunters!" target="_blank" rel="noopener noreferrer" class="ar-btn">
      <img src="/whatsapp.png" alt="" style="object-fit: contain;">
      WhatsApp
    </a>
    <a href="https://hunters.com.br/" target="_blank" rel="noopener noreferrer" class="ar-btn">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76" />
      </svg>
      Site
    </a>
  </div>

  <!-- Video Overlays -->
  <div class="video-overlay" id="overlay-hunters">
    <video id="videoHunters" src="/video.mp4" loop playsinline webkit-playsinline crossorigin="anonymous"></video>
  </div>
  <div class="video-overlay" id="overlay-navegue">
    <video id="videoNavegue" src="/video-corporativo.mp4" loop playsinline webkit-playsinline crossorigin="anonymous"></video>
  </div>

  <!-- Camera Canvas -->
  <canvas id="camerafeed"></canvas>

  <script>
    // === ELEMENTS ===
    const tapOverlay = document.getElementById('tap-overlay');
    const loadingSpinner = document.getElementById('loading-spinner');
    const loadingText = document.getElementById('loading-text');
    const tapIcon = document.getElementById('tap-icon');
    const tapText = document.getElementById('tap-text');
    const tapSub = document.getElementById('tap-sub');
    const errorModal = document.getElementById('error-modal');
    const scannerHUD = document.getElementById('scanner-hud');
    const scanHint = document.getElementById('scan-hint');
    const statusPill = document.getElementById('status-pill');
    const statusText = document.getElementById('status-text');
    const videoHunters = document.getElementById('videoHunters');
    const videoNavegue = document.getElementById('videoNavegue');
    const overlayHunters = document.getElementById('overlay-hunters');
    const overlayNavegue = document.getElementById('overlay-navegue');

    // === STATUS PILL ===
    let pillTimer = null;
    function showStatus(msg, type = 'found') {
      statusPill.className = 'status-pill show ' + type;
      statusText.textContent = msg;
      clearTimeout(pillTimer);
      pillTimer = setTimeout(() => {
        statusPill.classList.remove('show');
      }, type === 'found' ? 8000 : 3000);
    }

    // === IMAGE TARGET DATA ===
    const huntersTarget = {
      imagePath: '/targets/hunters.png',
      metadata: {},
      name: 'hunters',
      type: 'PLANAR',
      properties: {
        left: 0, top: 167, width: 480, height: 305,
        originalWidth: 480, originalHeight: 640, isRotated: false
      }
    };

    const navegueTarget = {
      imagePath: '/targets/navegue.png',
      metadata: {},
      name: 'navegue',
      type: 'PLANAR',
      properties: {
        left: 0, top: 26, width: 479, height: 588,
        originalWidth: 480, originalHeight: 640, isRotated: false
      }
    };

    // === VIDEO MANAGEMENT ===
    const targetLabels = { hunters: 'Hunters', navegue: 'Navegue Seguro' };
    const targetVideos = {
      hunters: { video: videoHunters, overlay: overlayHunters },
      navegue: { video: videoNavegue, overlay: overlayNavegue }
    };

    function showVideo(name) {
      const t = targetVideos[name];
      if (!t) return;
      t.overlay.classList.add('active');
      t.video.play().catch(() => {
        t.video.muted = true;
        t.video.play().catch(() => {});
      });
      scannerHUD.classList.add('hidden');
      scanHint.classList.add('hidden');
      showStatus(targetLabels[name] || name, 'found');
    }

    function hideVideo(name) {
      const t = targetVideos[name];
      if (!t) return;
      t.video.pause();
      t.overlay.classList.remove('active');
      const anyActive = Object.values(targetVideos).some(v => v.overlay.classList.contains('active'));
      if (!anyActive) {
        scannerHUD.classList.remove('hidden');
        scanHint.classList.remove('hidden');
      }
      showStatus('Escaneando...', 'lost');
    }

    function hideAllVideos() {
      Object.keys(targetVideos).forEach(hideVideo);
    }

    // === 8TH WALL PIPELINE ===
    const imageTargetPipeline = {
      name: 'hunters-ar',
      listeners: [
        {
          event: 'reality.imagefound',
          process: (event) => {
            const name = event.detail ? event.detail.name : 'unknown';
            showVideo(name);
          }
        },
        {
          event: 'reality.imageupdated',
          process: () => {}
        },
        {
          event: 'reality.imagelost',
          process: (event) => {
            const name = event.detail ? event.detail.name : 'unknown';
            hideVideo(name);
          }
        }
      ]
    };

    // === INIT XR ===
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData: [navegueTarget, huntersTarget]
      });

      // Canvas quality pipeline — renders at native device resolution
      const canvasSizeHandler = {
        name: 'canvas-size-handler',
        onCanvasSizeChange: ({ canvasWidth, canvasHeight }) => {
          const canvas = document.getElementById('camerafeed');
          const dpr = Math.min(window.devicePixelRatio || 1, 2); // cap at 2x for performance
          canvas.width = canvasWidth * dpr;
          canvas.height = canvasHeight * dpr;
        },
        onStart: () => {
          const canvas = document.getElementById('camerafeed');
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          canvas.width = canvas.clientWidth * dpr;
          canvas.height = canvas.clientHeight * dpr;
        }
      };

      XR8.addCameraPipelineModules([
        XR8.GlTextureRenderer.pipelineModule(),
        XR8.XrController.pipelineModule(),
        canvasSizeHandler,
        imageTargetPipeline
      ]);

      // Switch from loader to tap prompt
      loadingSpinner.style.display = 'none';
      loadingText.style.display = 'none';
      tapIcon.style.display = 'flex';
      tapText.style.display = 'block';
      tapSub.style.display = 'block';
    };

    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);

    // === TAP TO START ===
    tapOverlay.addEventListener('click', () => {
      // Silent unlock — muted play+pause, never visible
      [videoHunters, videoNavegue].forEach(v => {
        v.muted = true;
        const p = v.play();
        if (p) p.then(() => { v.pause(); v.currentTime = 0; v.muted = false; }).catch(() => {});
      });

      tapOverlay.classList.add('hidden');

      try {
        XR8.run({
          canvas: document.getElementById('camerafeed'),
          allowedDevices: XR8.XrConfig.device().ANY
        });
      } catch (e) {
        errorModal.classList.add('show');
      }
    });

    // === BACK ===
    document.getElementById('btn-voltar').addEventListener('click', (e) => {
      e.preventDefault();
      hideAllVideos();
      try { XR8.stop(); } catch(err) {}
      window.location.href = 'index.html';
    });

    // === CLEANUP ===
    window.addEventListener('pagehide', () => {
      hideAllVideos();
      try { XR8.stop(); } catch(err) {}
    });

    // === TIMEOUT ===
    setTimeout(() => {
      if (!tapOverlay.classList.contains('hidden')) {
        tapOverlay.classList.add('hidden');
        errorModal.classList.add('show');
      }
    }, 25000);
  </script>
</body>
</html>
