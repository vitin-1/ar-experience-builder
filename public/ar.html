<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>

<body style="margin: 0px; overflow: hidden;">

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; colorManagement: true;">

    <a-marker preset="hiro">

      <a-plane src="/hunters-logo.png" position="0 0.1 0" rotation="-90 0 0" width="1" height="1"
        material="shader: flat; transparent: true; alphaTest: 0.5; side: double;"
        animation="property: position; to: 0 0.3 0; dir: alternate; dur: 2000; loop: true; easing: easeInOutQuad">
      </a-plane>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>
</body>

</html>
