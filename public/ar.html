<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualização AR</title>

  <style>
    /* 1. Zera as margens e esconde as barras de rolagem */
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      /* Fundo preto elegante antes da câmera abrir */
    }

    /* 2. Configura a câmera para preencher toda a tela */
    #camera-view {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      /* Faz o vídeo preencher a tela sem esticar/distorcer */
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      /* Mantém o vídeo na camada mais funda */
    }

    /* 3. Um botão de "Voltar" discreto (Opcional, mas recomendado) */
    .btn-voltar {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      /* Fica por cima do vídeo */
      padding: 10px 15px;
      background: rgba(0, 0, 0, 0.5);
      /* Fundo transparente profissional */
      color: white;
      text-decoration: none;
      font-family: sans-serif;
      border-radius: 8px;
      backdrop-filter: blur(4px);
      /* Efeito de vidro moderno */
    }
  </style>
</head>

<body>

  <a href="index.html" class="btn-voltar">⬅ Voltar</a>

  <video id="camera-view" autoplay playsinline></video>

</body>

</html>
