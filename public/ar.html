<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Hunters AR</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
      
      #ui-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
        padding-bottom: 40px; z-index: 999; pointer-events: none;
      }

      #btn-som {
        pointer-events: auto;
        background: rgba(0, 0, 0, 0.8); color: #00FFFF; border: 1px solid #00FFFF;
        padding: 15px 30px; border-radius: 30px; font-family: sans-serif; font-size: 16px;
        cursor: pointer; box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
      }

      #instrucao {
        position: absolute; top: 40px; text-align: center;
        background: rgba(0, 0, 0, 0.6); color: white; padding: 10px 20px;
        border-radius: 10px; font-family: sans-serif; font-size: 14px;
      }
    </style>
  </head>
  
  <body>
    <div id="ui-overlay">
      <div id="instrucao">Aponte a câmera para a logo da Hunters</div>
      <button id="btn-som">🔈 Toque para ativar o som</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: /targets.mind;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video id="meuVideo" src="/video.mp4" loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="alvo-logo">
        <a-video src="#meuVideo" position="0 0 0" width="1" height="0.5625" rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const video = document.querySelector('#meuVideo');
        const alvo = document.querySelector('#alvo-logo');
        const btnSom = document.querySelector('#btn-som');

        btnSom.addEventListener('click', () => {
          video.muted = false;
          btnSom.style.display = 'none';
          video.play().then(() => video.pause()).catch(() => {}); 
        });

        alvo.addEventListener("targetFound", () => {
          video.play(); 
        });

        alvo.addEventListener("targetLost", () => {
          video.pause();
        });
      });
    </script>
  </body>
</html>
