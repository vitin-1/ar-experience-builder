<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>Hunters AR Experience</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    :root {
      --primary: #00FFFF;
    }

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      font-family: 'Segoe UI', Roboto, sans-serif;
    }

    /* Fundo que escurece a tela até a câmera ligar */
    #ar-bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #091325 0%, #03060c 100%);
      transition: opacity 0.8s ease;
      z-index: 10;
    }

    #ui-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center;
      z-index: 20; pointer-events: none;
    }

    .top-bar {
      width: 100%; display: flex; justify-content: space-between; align-items: flex-start;
      padding: 20px; box-sizing: border-box; pointer-events: auto;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
      color: white; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 14px;
      backdrop-filter: blur(5px);
    }

    .logo-container {
      display: flex; flex-direction: column; align-items: center;
    }
    
    .logo-container img {
      width: 50px; filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.6)); margin-bottom: 4px;
    }
    
    .logo-text { color: white; font-size: 10px; font-weight: bold; letter-spacing: 2px; margin: 0; }

    /* Caixa de Escaneamento simples, em formato retrato */
    .scan-container {
      margin-top: 10vh; width: 75vw; max-width: 300px; height: 50vh; max-height: 400px;
      border: 2px dashed rgba(0, 255, 255, 0.3); border-radius: 16px;
      position: relative; display: flex; justify-content: center; align-items: center;
      transition: border-color 0.5s;
    }

    .scan-line {
      position: absolute; width: 100%; height: 2px; background: var(--primary);
      box-shadow: 0 0 15px var(--primary); top: 0;
      animation: scan 2.5s ease-in-out infinite;
    }

    @keyframes scan {
      0%, 100% { top: 0%; opacity: 0; }
      50% { top: 100%; opacity: 1; }
    }

    .bottom-controls {
      margin-top: auto; margin-bottom: 40px; text-align: center; pointer-events: auto;
    }

    #status-text {
      color: rgba(255,255,255,0.7); font-size: 12px; letter-spacing: 1px; margin-bottom: 12px; text-transform: uppercase;
    }

    #btn-unlock {
      background: var(--primary); color: #000; border: none; padding: 14px 30px;
      border-radius: 30px; font-weight: bold; font-size: 14px; cursor: pointer;
      box-shadow: 0 5px 20px rgba(0, 255, 255, 0.3); transition: all 0.3s;
    }
    #btn-unlock:disabled { opacity: 0.5; }

    .mindar-ui-overlay { display: none !important; }
  </style>
</head>

<body>
  <div id="ar-bg"></div>

  <div id="ui-layer">
    <div class="top-bar">
      <a href="/" class="back-btn">← Sair</a>
      <div class="logo-container">
        <img src="/Logo_hunters.png.png" alt="Hunters Logo" onerror="this.style.display='none'">
        <p class="logo-text">HUNTERS</p>
      </div>
      <div style="width: 70px;"></div> <!-- espaçador para estabilizar layout flex -->
    </div>

    <div class="scan-container" id="hud-frame">
      <div class="scan-line"></div>
    </div>

    <div class="bottom-controls">
      <p id="status-text">Carregando Motor RA...</p>
      <button id="btn-unlock" disabled>AGUARDE...</button>
    </div>
  </div>

  <a-scene id="main-scene"
    mindar-image="imageTargetSrc: /targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">
    <a-assets timeout="10000">
      <video id="meuVideo" src="/video.mp4" loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="alvo-logo">
      <a-video src="#meuVideo" position="0 0 0" width="1" height="0.5625"></a-video>
    </a-entity>
  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const sceneEl = document.querySelector('#main-scene');
      const video = document.querySelector('#meuVideo');
      const btn = document.querySelector('#btn-unlock');
      const statusText = document.querySelector('#status-text');
      const hud = document.querySelector('#hud-frame');
      const uiLayer = document.querySelector('#ui-layer');
      const alvo = document.querySelector('#alvo-logo');

      const destravaBotao = () => {
        btn.innerHTML = "ATIVAR EXPERIÊNCIA";
        btn.style.opacity = "1";
        btn.disabled = false;
        statusText.innerHTML = "Sistema pronto. Autorize a câmera.";
      };

      if (sceneEl.hasLoaded) {
        destravaBotao();
      } else {
        sceneEl.addEventListener('loaded', destravaBotao);
      }

      setTimeout(destravaBotao, 3000);

      btn.addEventListener('click', () => {
        try {
          statusText.innerHTML = "LIGANDO CÂMERA...";
          btn.style.display = 'none';
          document.getElementById('ar-bg').style.opacity = "0";

          const mindarSystem = sceneEl.systems['mindar-image-system'];
          mindarSystem.start();

          video.muted = false;
          video.play().then(() => video.pause()).catch(() => { });

          statusText.innerHTML = "BUSCANDO LOGO...";
        } catch (erro) {
          statusText.innerHTML = "ERRO: O sistema AR não carregou.";
          statusText.style.color = "red";
        }
      });

      alvo.addEventListener("targetFound", () => {
        video.play();
        hud.style.borderColor = "#00FFFF";
        statusText.innerHTML = "SISTEMA ONLINE • REPRODUZINDO";
        statusText.style.color = "#00FFFF";
      });

      alvo.addEventListener("targetLost", () => {
        video.pause();
        hud.style.borderColor = "rgba(0, 255, 255, 0.3)";
        statusText.innerHTML = "SINAL PERDIDO: Busque a logo";
        statusText.style.color = "white";
      });
    });
  </script>
</body>

</html>
