<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>

<body style="margin: 0px; overflow: hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; colorManagement: true;">

    <a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>
    <a-light type="directional" position="1 1 1" intensity="1"></a-light>

    <a-marker preset="hiro">

      <a-box position="0 0.5 0" scale="0.5 0.5 0.5" color="green" opacity="0.5"></a-box>

      <a-entity gltf-model="/tiny_planet_friends_3d-animal-4054.glb" position="0 0.5 0" rotation="0 0 0"
        scale="0.05 0.05 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>

</html>
