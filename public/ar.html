<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visualização AR</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <!-- Bibliotecas AR movidas APENAS para este arquivo -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* 1. Zera as margens e esconde as barras de rolagem */
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      /* Fundo preto elegante antes da câmera abrir */
    }

    /* 2. Configura a câmera para preencher toda a tela */
    #camera-view {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      /* Faz o vídeo preencher a tela sem esticar/distorcer */
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      /* Mantém o vídeo na camada mais funda */
    }

    /* 3. Um botão de "Voltar" discreto (Opcional, mas recomendado) */
    .btn-voltar {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      /* Fica por cima do vídeo */
      padding: 10px 15px;
      background: rgba(0, 0, 0, 0.5);
      /* Fundo transparente profissional */
      color: white;
      text-decoration: none;
      font-family: sans-serif;
      border-radius: 8px;
      backdrop-filter: blur(4px);
    }

    /* 4. Overlay da interface AR para garantir transparência correta */
    .mindar-ui-overlay {
      display: none !important;
    }

    #main-scene {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 5;
    }

    /* 5. Tela de Carregamento */
    #loading-screen {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: #0b0f19; z-index: 100;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      transition: opacity 0.6s ease, visibility 0.6s;
    }
    #loading-screen.hidden { opacity: 0; visibility: hidden; }

    .radar-spinner {
      width: 50px; height: 50px; border: 3px solid rgba(0, 255, 255, 0.1);
      border-top-color: #00FFFF; border-radius: 50%;
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .loading-text {
      color: #00FFFF; font-family: monospace; font-size: 13px; letter-spacing: 2px;
      text-transform: uppercase; animation: blink 1.5s infinite; text-align: center;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* 6. HUD Bordas Táticas (Scanner) */
    .hud-corners {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none; z-index: 2;
    }
    .corn {
      position: absolute; width: 40px; height: 40px; border: 2px solid rgba(0, 255, 255, 0.7);
      filter: drop-shadow(0 0 5px rgba(0,255,255,0.5));
    }
    .corn.tl { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
    .corn.tr { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
    .corn.bl { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
    .corn.br { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

    /* 7. Controles Comerciais AR */
    #ar-controls {
      position: absolute; bottom: 30px; width: 100%;
      display: flex; justify-content: center; gap: 15px;
      z-index: 10; pointer-events: auto; padding: 0 15px; box-sizing: border-box;
    }
    
    .ar-btn {
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.3);
      color: white; padding: 12px 16px; border-radius: 12px;
      text-decoration: none; font-size: 11px; font-weight: bold; font-family: sans-serif;
      backdrop-filter: blur(5px); display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.05);
      transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
    }
    
    .ar-btn:active {
      transform: scale(0.95);
      background: rgba(0, 255, 255, 0.2);
    }

    .ar-btn svg { width: 16px; height: 16px; fill: currentColor; }
    .ar-btn.outline svg { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* 8. Modal de Erro de Câmera */
    #error-modal {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(11, 15, 25, 0.95); z-index: 200;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 30px; box-sizing: border-box; text-align: center;
      opacity: 0; visibility: hidden; transition: opacity 0.5s ease;
      backdrop-filter: blur(10px);
    }
    #error-modal.show { opacity: 1; visibility: visible; }

    .error-box {
      background: rgba(255, 50, 50, 0.05); border: 1px solid rgba(255, 50, 50, 0.3);
      padding: 30px; border-radius: 16px; max-width: 400px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .error-box h2 {
      color: #ff4a4a; margin-top: 0; font-family: sans-serif; font-size: 18px; margin-bottom: 15px;
    }
    .error-box p {
      color: #e2e8f0; font-size: 14px; line-height: 1.6; font-family: sans-serif; margin-bottom: 25px;
    }

    .btn-reload {
      background: linear-gradient(90deg, #ff4a4a, #d40000);
      color: white; border: none; padding: 12px 24px; border-radius: 8px;
      font-weight: bold; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer; transition: transform 0.2s; box-shadow: 0 5px 15px rgba(255, 74, 74, 0.3);
    }
    .btn-reload:active { transform: scale(0.95); }
  </style>
</head>

<body>

  <div id="loading-screen">
    <div class="radar-spinner"></div>
    <div class="loading-text">Ligando Óptica Tática...</div>
  </div>

  <div id="error-modal">
    <div class="error-box">
      <h2>Acesso Bloqueado</h2>
      <p>Precisamos de acesso à sua câmera para a experiência de Realidade Aumentada funcionar. Por favor, libere a permissão no seu navegador e recarregue a página.</p>
      <button class="btn-reload" onclick="location.reload()">Recarregar Página</button>
    </div>
  </div>

  <div class="hud-corners">
    <div class="corn tl"></div>
    <div class="corn tr"></div>
    <div class="corn bl"></div>
    <div class="corn br"></div>
  </div>

  <a href="index.html" class="btn-voltar">⬅ Voltar</a>

  <div id="ar-controls">
    <a href="#" class="ar-btn">
      <!-- Ícone WhatsApp genérico SVG puro -->
      <svg viewBox="0 0 24 24"><path d="M12.031 0C5.385 0 0 5.385 0 12.031c0 2.224.581 4.39 1.688 6.294L.436 23.5l5.297-1.39A11.968 11.968 0 0012.031 24c6.646 0 12.031-5.385 12.031-12.031S18.677 0 12.031 0zm3.504 17.15c-.147.416-.838.816-1.155.845-.318.03-1.026-.067-3.003-1.025-2.585-1.258-4.223-3.904-4.354-4.08-.13-.175-1.037-1.383-1.037-2.64 0-1.257.65-1.879.882-2.128.232-.249.664-.325.882-.325.218 0 .436.004.629.013.208.01.488-.078.762.586.273.664.931 2.277 1.011 2.443.08.166.164.444.026.721-.138.277-.249.36-.436.561-.186.201-.397.382-.562.582-.187.232-.387.493-.162.882.226.39 1.002 1.656 2.152 2.684.862.771 1.708 1.077 2.123 1.253.308.13.784.09 1.05-.208.266-.298 1.134-1.326 1.442-1.78.307-.453.614-.376 1.03-.22 415.156 1.487 2.766 1.642 2.87.103.104-.447.665-.705 1.127-.999.462-.294 1.411-1.085 1.503z"/></svg>
      Falar no WhatsApp
    </a>
    <a href="#" class="ar-btn outline">
      <!-- Ícone Serviços SVG -->
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
      Ver Serviços
    </a>
  </div>

  <!-- Fallback/Raw Video solicitado -->
  <video id="camera-view" autoplay playsinline></video>

  <!-- Motor de Realidade Aumentada rodando isolado sobreposto à câmera -->
  <a-scene id="main-scene" mindar-image="imageTargetSrc: /targets.mind; autoStart: true; uiLoading: no; uiScanning: no;"
    color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">
    <a-assets timeout="10000">
      <video id="meuVideo" src="/video.mp4" loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="alvo-logo">
      <a-video src="#meuVideo" position="0 0 0" width="1" height="0.5625"></a-video>
    </a-entity>
  </a-scene>

  <script>
    // 1. Script Raiz (solicitado) de permissão de câmera e injeção na tag <video>
    const startRawCamera = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });
        const videoElement = document.getElementById("camera-view");
        videoElement.srcObject = stream;
        
        // Esconde a tela de loading quando a câmera inicializar fisicamente e o video começar a tocar
        videoElement.onloadedmetadata = () => {
          document.getElementById('loading-screen').classList.add('hidden');
        };
      } catch (err) {
        console.error("Erro ao acessar a câmera manualmente:", err);
        // Oculta a tela de loading indefinida e mostra o erro
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('error-modal').classList.add('show');
      }
    };

    // Inicia a câmera raw
    startRawCamera();

    // 2. Integração do Vídeo 3D sobre o Alvo (MindAR)
    document.addEventListener("DOMContentLoaded", function () {
      const alvo = document.querySelector('#alvo-logo');
      const videoAsset = document.querySelector('#meuVideo');

      alvo.addEventListener("targetFound", () => {
        videoAsset.muted = false; // Necessário interagir antes se o navegador bloquear áudio automático
        videoAsset.play().catch(() => { });
        console.log("Alvo AR Encontrado - Reproduzindo o Holograma");
      });

      alvo.addEventListener("targetLost", () => {
        videoAsset.pause();
        console.log("Alvo AR Perdido - Pausando");
      });
    });
  </script>
</body>

</html>
