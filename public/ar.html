<script>
  document.addEventListener("DOMContentLoaded", function () {
    const video = document.querySelector('#meuVideo');
    const alvo = document.querySelector('#alvo-logo');
    const aviso = document.querySelector('#aviso-play');

    // FUNÇÃO MÁGICA: Libera o som quando o usuário toca na tela
    const destravarAudio = function () {
      video.muted = false; // Tira o mudo!
      video.play();        // Dá um play rápido para o navegador aceitar o áudio
      video.pause();       // Pausa na mesma hora, para esperar a logo aparecer
      aviso.style.display = 'none'; // Esconde a mensagem de aviso

      // Remove o evento de clique para não repetir a função
      window.removeEventListener('click', destravarAudio);
      window.removeEventListener('touchstart', destravarAudio);
    };

    // Escuta o primeiro toque na tela para rodar a função mágica
    window.addEventListener('click', destravarAudio);
    window.addEventListener('touchstart', destravarAudio);

    // Quando a câmera finalmente achar a logo da Hunters...
    alvo.addEventListener("targetFound", event => {
      video.play(); // Toca o vídeo (agora com som!)
    });

    // BÔNUS: Quando o celular parar de olhar pra logo, o vídeo pausa 
    alvo.addEventListener("targetLost", event => {
      video.pause();
    });
  });
</script>
