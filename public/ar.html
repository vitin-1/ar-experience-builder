<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* Aviso para o usuário tocar na tela */
    #aviso-play {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-family: sans-serif;
      z-index: 999;
      text-align: center;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div id="aviso-play">Toque na tela para habilitar o áudio e a AR</div>

  <a-scene mindar-image="imageTargetSrc: /targets.mind; autoStart: true;" color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="meuVideo" src="/video.mp4" autoplay muted loop playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="alvo-logo">
      <a-video src="#meuVideo" position="0 0 0" width="1" height="1" rotation="0 0 0"></a-video>
    </a-entity>

  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const video = document.querySelector('#meuVideo');
      const alvo = document.querySelector('#alvo-logo');
      const aviso = document.querySelector('#aviso-play');

      // Função para liberar o áudio
      const destravarAudio = function () {
        video.muted = false;
        video.play();
        video.pause();
        aviso.style.display = 'none';

        window.removeEventListener('click', destravarAudio);
        window.removeEventListener('touchstart', destravarAudio);
      };

      // Escuta o toque na tela
      window.addEventListener('click', destravarAudio);
      window.addEventListener('touchstart', destravarAudio);

      // Quando achar a logo, dá o play
      alvo.addEventListener("targetFound", event => {
        video.play();
      });

      // Quando perder a logo, pausa
      alvo.addEventListener("targetLost", event => {
        video.pause();
      });
    });
  </script>

</body>

</html>
