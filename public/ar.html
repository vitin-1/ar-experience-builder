<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    /* Fundo preto nativo para evitar os clarões brancos da tela */
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }

    #ra-ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #0B0F19;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    #btn-iniciar {
      background: #00FFFF;
      color: #0B0F19;
      padding: 18px 40px;
      border-radius: 50px;
      font-family: sans-serif;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
      border: none;
      letter-spacing: 1px;
    }
  </style>

  <script>
    AFRAME.registerComponent('video-handler', {
      init: function () {
        this.video = document.querySelector('#meuVideo');
        this.isTargetVisible = false; // Memória para saber se a logo está na tela

        this.el.addEventListener('targetFound', () => {
          this.isTargetVisible = true;
          this.video.play();
        });

        this.el.addEventListener('targetLost', () => {
          this.isTargetVisible = false;
          this.video.pause();
        });
      }
    });
  </script>
</head>

<body>
  <div id="ra-ui-container">
    <div style="color: white; font-family: sans-serif; text-align: center; margin-bottom: 30px;">
      <h2 style="color: #00FFFF; margin-bottom: 10px;">HUNTERS AR</h2>
      <p style="opacity: 0.8;">Toque abaixo para ativar a câmera e o áudio</p>
    </div>
    <button id="btn-iniciar">INICIAR CÂMERA</button>
  </div>

  <a-scene mindar-image="imageTargetSrc: /targets.mind; autoStart: true;" color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="meuVideo" src="/video.mp4" preload="auto" muted loop playsinline webkit-playsinline
        crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="alvo-logo" video-handler>
      <a-video src="#meuVideo" position="0 0 0" width="1" height="1" rotation="0 0 0"></a-video>
    </a-entity>

  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const video = document.querySelector('#meuVideo');
      const btnIniciar = document.querySelector('#btn-iniciar');
      const uiContainer = document.querySelector('#ra-ui-container');
      const alvo = document.querySelector('#alvo-logo');

      btnIniciar.addEventListener('click', () => {
        // 1. Tira a tela preta da frente
        uiContainer.style.opacity = '0';
        setTimeout(() => { uiContainer.style.display = 'none'; }, 500);

        // 2. Tira o mudo do vídeo
        video.muted = false;

        // 3. Usa a Promise do navegador para garantir que ele entendeu o clique
        let playPromise = video.play();

        if (playPromise !== undefined) {
          playPromise.then(() => {
            // Se o navegador aceitou o Play, nós checamos: A logo está visível?
            // Se NÃO estiver, nós pausamos imediatamente e resetamos.
            if (!alvo.components['video-handler'].isTargetVisible) {
              video.pause();
              video.currentTime = 0;
            }
          }).catch(error => {
            console.log("Erro de permissão no celular:", error);
          });
        }
      });
    });
  </script>
</body>

</html>
