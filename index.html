<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Hunters AR Experience</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      :root {
        --cyan: #00FFFF;
        --navy: #0B0F19;
        --text-muted: #8b9bb4;
        --card-bg: rgba(255, 255, 255, 0.03);
      }
      
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }

      /* Camada de UI - Fundo que desaparece ao clicar */
      #ui-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at center, #111827 0%, var(--navy) 100%);
        transition: background 1s ease;
        display: flex; flex-direction: column; justify-content: space-between;
        align-items: center; z-index: 100; pointer-events: none;
        padding: 24px 20px; box-sizing: border-box;
      }

      /* Grid Translúcido */
      .grid-overlay {
        position: absolute; inset: 0; opacity: 0.04; transition: opacity 1s ease;
        background-image: linear-gradient(var(--cyan) 1px, transparent 1px), linear-gradient(90deg, var(--cyan) 1px, transparent 1px);
        background-size: 60px 60px; pointer-events: none; z-index: -1;
      }

      /* Animação de Surgimento */
      .fade-up { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
      @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

      /* TOPO: Logo e Título */
      .header-container { text-align: center; pointer-events: auto; }
      .header-container img { width: 64px; filter: drop-shadow(0 0 10px rgba(0,255,255,0.3)); margin-bottom: 8px; }
      .brand-title { font-size: 28px; font-weight: 900; letter-spacing: 2px; color: white; margin: 0; }
      .brand-subtitle { font-size: 14px; letter-spacing: 0.5em; color: var(--cyan); margin: 0; text-transform: uppercase; }

      /* CENTRO: O Radar */
      .sonar-wrapper {
        position: relative; width: 220px; height: 220px;
        display: flex; justify-content: center; align-items: center;
      }
      .sonar-frame {
        position: absolute; inset: 0; border: 1px solid rgba(0, 255, 255, 0.15);
        border-radius: 12px; transition: border-color 0.5s;
      }
      .sonar-corner { position: absolute; width: 24px; height: 24px; border: 2px solid var(--cyan); transition: all 0.5s; }
      .tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; border-top-left-radius: 12px; }
      .tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; border-top-right-radius: 12px; }
      .bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; border-bottom-left-radius: 12px; }
      .br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; border-bottom-right-radius: 12px; }
      
      .sonar-circle {
        position: absolute; width: 140px; height: 140px; border-radius: 50%;
        border: 1px dashed rgba(0, 255, 255, 0.3);
      }
      .sonar-sweep {
        position: absolute; width: 140px; height: 140px; border-radius: 50%;
        background: conic-gradient(from 0deg, transparent 70%, rgba(0, 255, 255, 0.4) 100%);
        animation: spin 2s linear infinite;
      }
      @keyframes spin { 100% { transform: rotate(360deg); } }

      /* RODAPÉ: Cards e Botão */
      .bottom-section { display: flex; flex-direction: column; align-items: center; width: 100%; transition: opacity 0.5s ease; }
      
      .about-title { color: var(--cyan); text-transform: uppercase; letter-spacing: 0.4em; font-size: 10px; font-weight: bold; margin-bottom: 4px; }
      .about-desc { color: var(--text-muted); font-size: 12px; text-align: center; max-width: 320px; margin-top: 0; line-height: 1.5; }

      .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 380px; margin-bottom: 20px; }
      .feature-card {
        background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
        backdrop-filter: blur(4px); padding: 12px 8px; border-radius: 8px;
        display: flex; flex-direction: column; align-items: center; text-align: center;
      }
      .feature-icon-box { background: rgba(0,255,255,0.1); width: 32px; height: 32px; border-radius: 6px; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; }
      .feature-card p { color: white; font-size: 10px; font-weight: 600; margin: 0; text-transform: uppercase; }

      /* Botão CTA */
      #btn-unlock {
        pointer-events: auto; background: linear-gradient(90deg, #0088ff, var(--cyan));
        color: #000; border: none; padding: 14px 28px; border-radius: 8px;
        font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 0.25em;
        cursor: pointer; display: flex; align-items: center; gap: 10px;
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); transition: all 0.3s;
        opacity: 0.5;
      }
      #btn-unlock:active { transform: scale(0.97); }

      /* Status AR */
      .ar-status { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-top: 16px; }
      .pulse-dot { width: 8px; height: 8px; background: var(--cyan); border-radius: 50%; box-shadow: 0 0 10px var(--cyan); animation: pulse 1.5s infinite; }
      @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(0, 255, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); } }

      .mindar-ui-overlay { display: none !important; }
      
      /* Ocultar elementos quando a AR iniciar */
      .hide-on-ar { transition: opacity 0.5s ease, transform 0.5s ease; }
      .ar-active .hide-on-ar { opacity: 0; pointer-events: none; transform: translateY(10px); }
    </style>
  </head>
  
  <body>
    <div id="ui-layer">
      <div class="grid-overlay" id="grid-bg"></div>

      <div class="header-container fade-up" style="animation-delay: 0.1s;">
        <img src="/Logo_hunters.png.png" alt="Hunters" onerror="this.style.display='none'">
        <h1 class="brand-title">HUNTERS</h1>
        <p class="brand-subtitle">MANPOWER</p>
      </div>

      <div class="sonar-wrapper fade-up" style="animation-delay: 0.4s;" id="reticle">
        <div class="sonar-frame" id="sonar-border"></div>
        <div class="sonar-corner tl"></div><div class="sonar-corner tr"></div>
        <div class="sonar-corner bl"></div><div class="sonar-corner br"></div>
        <div class="sonar-circle"></div>
        <div class="sonar-sweep" id="radar-sweep"></div>
      </div>

      <div class="bottom-section hide-on-ar fade-up" style="animation-delay: 0.6s;" id="bottom-ui">
        
        <p class="about-title">Quem Somos</p>
        <p class="about-desc">A Hunters ManPower atua como parceira estratégica em operações que exigem precisão, segurança e alta performance.</p>

        <div class="features-grid">
          <div class="feature-card">
            <div class="feature-icon-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00FFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div>
            <p>Precisão</p>
          </div>
          <div class="feature-card">
            <div class="feature-icon-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00FFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
            <p>Safety</p>
          </div>
          <div class="feature-card">
            <div class="feature-icon-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00FFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
            <p>Performance</p>
          </div>
        </div>

        <button id="btn-unlock" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          <span id="btn-text">INICIANDO SISTEMA...</span>
        </button>

        <div class="ar-status">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/></svg>
          <span id="status-label">Preparando Ambiente</span>
          <div class="pulse-dot"></div>
        </div>
      </div>
    </div>

    <a-scene 
      id="main-scene"
      mindar-image="imageTargetSrc: /targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets timeout="10000">
        <video id="meuVideo" src="/video.mp4" loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="alvo-logo">
        <a-video src="#meuVideo" position="0 0 0" width="1" height="0.5625"></a-video>
      </a-entity>
    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const sceneEl = document.querySelector('#main-scene');
        const video = document.querySelector('#meuVideo');
        const btn = document.querySelector('#btn-unlock');
        const btnText = document.querySelector('#btn-text');
        const statusLabel = document.querySelector('#status-label');
        const uiLayer = document.querySelector('#ui-layer');
        const gridBg = document.querySelector('#grid-bg');
        const alvo = document.querySelector('#alvo-logo');
        const sonarBorder = document.querySelector('#sonar-border');
        const radarSweep = document.querySelector('#radar-sweep');

        const destravaBotao = () => {
          btnText.innerHTML = "ABRIR CÂMERA E INICIAR RA";
          btn.style.opacity = "1";
          btn.disabled = false;
          statusLabel.innerHTML = "Realidade Aumentada disponível";
        };

        if (sceneEl.hasLoaded) { destravaBotao(); } else { sceneEl.addEventListener('loaded', destravaBotao); }
        setTimeout(destravaBotao, 3000); 

        btn.addEventListener('click', () => {
          try {
            uiLayer.classList.add('ar-active');
            uiLayer.style.background = "transparent";
            gridBg.style.opacity = "0.01";
            statusLabel.innerHTML = "BUSCANDO LOGO NO AMBIENTE...";

            const mindarSystem = sceneEl.systems['mindar-image-system'];
            mindarSystem.start(); 

            video.muted = false;
            video.play().then(() => video.pause()).catch(() => {});
          } catch (erro) {
            statusLabel.innerHTML = "ERRO NA CÂMERA";
          }
        });

        alvo.addEventListener("targetFound", () => {
          video.play();
          sonarBorder.style.borderColor = "#00FFFF";
          radarSweep.style.background = "conic-gradient(from 0deg, transparent 70%, rgba(0, 255, 255, 0.8) 100%)";
          statusLabel.innerHTML = "CONECTADO: REPRODUZINDO";
        });

        alvo.addEventListener("targetLost", () => {
          video.pause();
          sonarBorder.style.borderColor = "rgba(0, 255, 255, 0.15)";
          radarSweep.style.background = "conic-gradient(from 0deg, transparent 70%, rgba(0, 255, 255, 0.4) 100%)";
          statusLabel.innerHTML = "SINAL PERDIDO: AJUSTE A LOGO";
        });
      });
    </script>
  </body>
</html>
