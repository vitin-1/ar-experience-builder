<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Hunters AR Experience</title>
    
    <title>Hunters AR Experience</title>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

      :root {
        --cyan: #00FFFF;
        --navy: #0B0F19;
        --text-muted: #8b9bb4;
        --card-bg: rgba(255, 255, 255, 0.03);
      }
      
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }

      /* Camada de UI - Fundo que desaparece ao clicar */
      #ui-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(135deg, #091325 0%, #03060c 100%);
        transition: background 1s ease;
        display: flex; flex-direction: column; justify-content: space-between;
        align-items: center; z-index: 100; pointer-events: none;
        padding: 24px 20px; box-sizing: border-box;
      }

      /* Animacoes */

      /* Ondas Realistas */
      .ocean {
        position: absolute;
        width: 100%;
        height: 35vh;
        bottom: 0;
        left: 0;
        overflow: hidden;
        z-index: 0;
        pointer-events: none;
        opacity: 0.35; /* Fundo mais sutil */
      }
      .waves {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 100%;
        min-height: 150px;
      }
      .parallax > use {
        animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
      }
      .parallax > use:nth-child(1) {
        animation-delay: -2s;
        animation-duration: 7s;
        fill: rgba(0, 255, 255, 0.4);
      }
      .parallax > use:nth-child(2) {
        animation-delay: -3s;
        animation-duration: 10s;
        fill: rgba(0, 255, 255, 0.2);
      }
      .parallax > use:nth-child(3) {
        animation-delay: -4s;
        animation-duration: 13s;
        fill: rgba(0, 255, 255, 0.1);
      }
      .parallax > use:nth-child(4) {
        animation-delay: -5s;
        animation-duration: 20s;
        fill: rgba(0, 255, 255, 0.05); /* Mar mais denso e profundo */
      }
      @keyframes move-forever {
        0% { transform: translate3d(-90px, 0, 0); }
        100% { transform: translate3d(85px, 0, 0); }
      }
      
      /* Garantir que ui fiquem por cima das ondas */
      .header-container, .sonar-wrapper, .bottom-section {
        position: relative;
        z-index: 10;
      }

      /* Animação de Surgimento */
      .fade-up { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
      @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

      /* TOPO: Logo e Título */
      .header-container { text-align: center; pointer-events: auto; }
      .header-container img { width: 72px; filter: drop-shadow(0 0 35px rgba(0,255,255,0.9)) drop-shadow(0 0 15px rgba(0,255,255,0.6)); margin-bottom: 12px; }
      .brand-title { font-size: 28px; font-weight: 900; letter-spacing: 2px; color: white; margin: 0; }
      .brand-subtitle { font-size: 14px; letter-spacing: 0.5em; color: var(--cyan); margin: 0; text-transform: uppercase; }

      /* CENTRO: O Radar */
      .sonar-wrapper {
        position: relative; width: 260px; height: 260px;
        display: flex; justify-content: center; align-items: center;
      }
      .sonar-frame {
        position: absolute; inset: 0; border: 1px solid rgba(0, 255, 255, 0.15);
        border-radius: 12px; transition: border-color 0.5s;
      }
      .sonar-corner { position: absolute; width: 24px; height: 24px; border: 2px solid var(--cyan); transition: all 0.5s; }
      .tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; border-top-left-radius: 12px; }
      .tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; border-top-right-radius: 12px; }
      .bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; border-bottom-left-radius: 12px; }
      .br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; border-bottom-right-radius: 12px; }
      
      .sonar-circle {
        position: absolute; width: 180px; height: 180px; border-radius: 50%;
        border: 1px dashed rgba(0, 255, 255, 0.4);
        box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.1);
      }
      .sonar-grid {
        position: absolute; width: 180px; height: 180px; border-radius: 50%;
        background-image: 
          radial-gradient(transparent 25%, rgba(0,255,255,0.2) 26%, transparent 28%),
          radial-gradient(transparent 55%, rgba(0,255,255,0.2) 56%, transparent 58%),
          linear-gradient(90deg, transparent 49.5%, rgba(0,255,255,0.3) 50%, transparent 50.5%),
          linear-gradient(0deg, transparent 49.5%, rgba(0,255,255,0.3) 50%, transparent 50.5%);
        z-index: 1;
      }
      .blip {
        position: absolute; width: 6px; height: 6px; background-color: var(--cyan);
        border-radius: 50%; box-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan);
        opacity: 0;
        animation: blip 2s infinite;
        z-index: 2;
      }
      @keyframes blip {
        0% { opacity: 0; transform: scale(0.5); }
        5% { opacity: 1; transform: scale(1.5); }
        30% { opacity: 0.3; transform: scale(1); }
        100% { opacity: 0; }
      }
      .sonar-sweep {
        position: absolute; width: 180px; height: 180px; border-radius: 50%;
        background: conic-gradient(from 0deg, transparent 70%, rgba(0, 255, 255, 0.6) 100%);
        animation: spin 2s linear infinite;
        z-index: 3;
      }
      @keyframes spin { 100% { transform: rotate(360deg); } }

      /* RODAPÉ: Cards e Botão */
      .bottom-section { display: flex; flex-direction: column; align-items: center; width: 100%; transition: opacity 0.5s ease; }
      
      .about-title { font-family: 'JetBrains Mono', monospace; color: var(--cyan); text-transform: uppercase; letter-spacing: 0.2em; font-size: 14px; font-weight: bold; margin-bottom: 8px; }
      .about-desc { font-family: 'JetBrains Mono', monospace; color: #e2e8f0; font-size: 13px; text-align: center; max-width: 360px; margin-top: 0; line-height: 1.6; }

      .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 380px; margin-bottom: 20px; }
      .feature-card {
        background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
        backdrop-filter: blur(4px); padding: 12px 8px; border-radius: 8px;
        display: flex; flex-direction: column; align-items: center; text-align: center;
      }
      .feature-icon-box { background: rgba(0,255,255,0.1); width: 32px; height: 32px; border-radius: 6px; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; }
      .feature-card p { color: white; font-size: 10px; font-weight: 600; margin: 0; text-transform: uppercase; }

      #btn-unlock {
        pointer-events: auto; background: linear-gradient(90deg, #0088ff, var(--cyan));
        color: #000; text-decoration: none; border: none; padding: 14px 28px; border-radius: 8px;
        font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 0.25em;
        cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); transition: all 0.3s;
        opacity: 1; max-width: 90vw;
      }
      #btn-unlock:active { transform: scale(0.97); }

      /* Status AR */
      .ar-status { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-top: 16px; }
      .pulse-dot { width: 8px; height: 8px; background: var(--cyan); border-radius: 50%; box-shadow: 0 0 10px var(--cyan); animation: pulse 1.5s infinite; }
      @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(0, 255, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); } }

      .mindar-ui-overlay { display: none !important; }
      
      /* Ocultar elementos quando a AR iniciar */
      .hide-on-ar { transition: opacity 0.5s ease, transform 0.5s ease; }
      .ar-active .hide-on-ar { opacity: 0; pointer-events: none; transform: translateY(10px); }

      /* RESPONSIVIDADE MOBILE HYPER-FLUIDA */
      @media (max-width: 480px) {
        .about-title { font-size: 12px; }
        .about-desc { font-size: 11px; max-width: 95vw; }
        .feature-card p { font-size: 9px; }
        .feature-card { padding: 10px 4px; }
        #btn-unlock { padding: 12px 20px; font-size: 10px; width: 100%; }
        .features-grid { gap: 6px; }
      }
      
      @media (max-height: 750px) {
        #ui-layer { padding: 15px 15px; }
        .sonar-wrapper { transform: scale(0.9); margin: 5px 0; }
        .header-container img { width: 56px; margin-bottom: 8px; }
        .brand-title { font-size: 24px; }
        .features-grid { margin-bottom: 12px; }
        .about-title { margin-bottom: 4px; }
      }

      @media (max-height: 600px) {
        .sonar-wrapper { transform: scale(0.7); margin: -10px 0; }
        .features-grid { margin-bottom: 8px; }
        .header-container img { width: 44px; margin-bottom: 4px; }
        .brand-title { font-size: 20px; }
        .about-desc { font-size: 11px; line-height: 1.3; margin-bottom: 4px; }
        .ocean { height: 20vh; opacity: 0.2; }
      }
    </style>
  </head>
  
  <body>
    <div id="ui-layer">

      <!-- Efeito de Mar Realista -->
      <div class="ocean">
        <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
          <defs>
            <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
          </defs>
          <g class="parallax">
            <use xlink:href="#gentle-wave" x="48" y="0" />
            <use xlink:href="#gentle-wave" x="48" y="3" />
            <use xlink:href="#gentle-wave" x="48" y="5" />
            <use xlink:href="#gentle-wave" x="48" y="7" />
          </g>
        </svg>
      </div>

      <div class="header-container fade-up" style="animation-delay: 0.1s;">
        <img src="/Logo_hunters.png.png" alt="Hunters" onerror="this.style.display='none'">
        <h1 class="brand-title">HUNTERS</h1>
        <p class="brand-subtitle">MANPOWER</p>
      </div>

      <div class="sonar-wrapper fade-up" style="animation-delay: 0.4s;" id="reticle">
        <div class="sonar-grid"></div>
        <div class="sonar-circle"></div>
        <div class="sonar-sweep" id="radar-sweep"></div>
        
        <!-- Pontos do Sonar (Blips) -->
        <div class="blip" style="top: 25%; left: 70%; animation-delay: 0.3s;"></div>
        <div class="blip" style="top: 75%; left: 65%; animation-delay: 0.8s;"></div>
        <div class="blip" style="top: 60%; left: 20%; animation-delay: 1.3s;"></div>
        <div class="blip" style="top: 30%; left: 35%; animation-delay: 1.8s;"></div>
      </div>

      <div class="bottom-section hide-on-ar fade-up" style="animation-delay: 0.6s;" id="bottom-ui">
        
        <p class="about-title">Quem Somos</p>
        <p class="about-desc">A Hunters ManPower atua como parceira estratégica em operações que exigem precisão, segurança e alta performance.</p>

        <div class="features-grid">
          <div class="feature-card">
            <div class="feature-icon-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00FFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div>
            <p>Precisão</p>
          </div>
          <div class="feature-card">
            <div class="feature-icon-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00FFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
            <p>Safety</p>
          </div>
          <div class="feature-card">
            <div class="feature-icon-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00FFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
            <p>Performance</p>
          </div>
        </div>

        <a href="ar.html" id="btn-unlock">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          <span id="btn-text">ABRIR CÂMERA E INICIAR RA</span>
        </a>

        <div class="ar-status">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/></svg>
          <span id="status-label">SISTEMA PRONTO</span>
          <div class="pulse-dot"></div>
        </div>
      </div>
    </div>

  </body>
</html>
